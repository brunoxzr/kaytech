<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bruno Kay | Links Oficiais</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg: #0d0d0d;
      --card: rgba(18, 18, 18, .74);
      --line: rgba(255, 255, 255, .11);
      --text: #f4f4f4;
      --muted: #a5a5a5;
      --white: #ffffff;
      --shadow: 0 24px 80px rgba(0, 0, 0, .55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.08), transparent 32%),
        radial-gradient(circle at top right, rgba(255,255,255,.04), transparent 30%),
        var(--bg);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .video-bg {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
      background: #050505;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.08);
      filter: blur(8px) brightness(.42) saturate(1.05);
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(90deg, rgba(3,3,3,.86) 0%, rgba(3,3,3,.56) 50%, rgba(3,3,3,.88) 100%),
        linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.92));
    }

    .page {
      min-height: 100vh;
      width: min(100% - 28px, 470px);
      margin: 0 auto;
      padding: 34px 0;
      display: grid;
      place-items: center;
    }

    .panel {
      width: 100%;
      padding: clamp(24px, 6vw, 34px);
      border: 1px solid var(--line);
      border-radius: 34px;
      background:
        radial-gradient(circle at 50% 0, rgba(255,255,255,.08), transparent 36%),
        linear-gradient(180deg, rgba(255,255,255,.062), rgba(255,255,255,.026));
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 33px;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,255,255,.08), transparent 42%);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .profile {
      display: grid;
      justify-items: center;
      text-align: center;
      margin-bottom: 24px;
    }

    .photo-wrap {
      width: 154px;
      height: 184px;
      padding: 3px;
      margin-bottom: 17px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255,255,255,.78), rgba(255,255,255,.08));
      box-shadow:
        0 22px 60px rgba(0,0,0,.42),
        0 0 0 1px rgba(255,255,255,.08);
      transform: rotate(-1.5deg);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 25px;
      display: block;
      filter: saturate(1.04) contrast(1.03);
    }

    .status {
      min-height: 42px;
      padding: 0 16px;
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 999px;
      background: rgba(255,255,255,.055);
      color: #dcdcdc;
      font-size: .88rem;
      font-weight: 800;
      box-shadow: 0 18px 46px rgba(0,0,0,.24);
    }

    .status i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #44e28a;
      box-shadow: 0 0 18px rgba(68,226,138,.8);
    }

    h1 {
      font-size: clamp(2.65rem, 10vw, 4.1rem);
      line-height: .95;
      letter-spacing: -.065em;
      color: #fff;
      margin-bottom: 14px;
    }

    h1 span {
      color: #fff;
      text-shadow: 0 0 42px rgba(255,255,255,.22);
    }

    .subtitle {
      max-width: 340px;
      color: var(--muted);
      line-height: 1.62;
      font-size: .98rem;
      font-weight: 500;
    }

    .links {
      display: grid;
      gap: 13px;
    }

    .link {
      min-height: 66px;
      padding: 0 20px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,.045);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: #f1f1f1;
      font-size: 1rem;
      font-weight: 850;
      box-shadow: 0 18px 44px rgba(0,0,0,.22);
      transition: .24s ease;
    }

    .link:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,.075);
      border-color: rgba(255,255,255,.18);
    }

    .link.primary {
      background: #fff;
      color: #111;
      border-color: #fff;
      box-shadow: 0 20px 54px rgba(255,255,255,.08);
    }

    .link-left {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .link-left span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .link-left i {
      width: 22px;
      text-align: center;
      font-size: 1.22rem;
    }

    .link .arrow {
      color: rgba(255,255,255,.48);
      font-size: .95rem;
      flex: 0 0 auto;
    }

    .link.primary .arrow {
      color: #111;
    }

    .whatsapp {
      color: #16b85e;
    }

    .linkedin {
      color: #4ea3ff;
    }

    .instagram {
      color: #ff6db7;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      color: rgba(255,255,255,.46);
      font-size: .78rem;
      font-weight: 700;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      animation: reveal .72s ease forwards;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 420px) {
      .page {
        width: min(100% - 20px, 470px);
        padding: 20px 0;
      }

      .panel {
        border-radius: 28px;
      }

      .photo-wrap {
        width: 138px;
        height: 166px;
      }

      .link {
        min-height: 62px;
        border-radius: 18px;
        font-size: .95rem;
      }
    }
  </style>
</head>

<body>
  <div class="video-bg" aria-hidden="true">

  </div>
  <div class="video-overlay" aria-hidden="true"></div>

  <main class="page">
    <section class="panel">

        <nav class="links" aria-label="Links oficiais">

          </a>

          <a href="portfolio/index.html" class="link reveal" style="animation-delay:.17s">

              <i class="fa-solid fa-layer-group"></i>

          </a>

          <a href="https://www.linkedin.com/in/bruno-yudi-kay-383201317/" target="_blank" rel="noopener" class="link reveal" style="animation-delay:.22s">
            <span class="link-left">
              <i class="fab fa-linkedin linkedin"></i>
              <span>LinkedIn</span>
            </span>
            <i class="fa-solid fa-chevron-right arrow"></i>
          </a>

          <a href="https://github.com/brunoxzr" target="_blank" rel="noopener" class="link reveal" style="animation-delay:.27s">
            <span class="link-left">
              <i class="fab fa-github"></i>

            </span>
            <i class="fa-solid fa-chevron-right arrow"></i>
          </a>

          <a href="https://instagram.com/kay.techsolutions" target="_blank" rel="noopener" class="link reveal" style="animation-delay:.32s">
            <span class="link-left">
              <i class="fab fa-instagram instagram"></i>
              <span>KayTech Solutions</span>
            </span>
            <i class="fa-solid fa-chevron-right arrow"></i>
          </a>
        </nav>

        <footer class="footer reveal" style="animation-delay:.38s">
          © 2026 Bruno Kay • Todos os direitos reservados
        </footer>
      </div>
    </section>
  </main>
</body>
</html>
